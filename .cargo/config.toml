# Lurek2D Cargo configuration
# Redirect all build outputs to build/debug and build/release
# instead of the default target/debug and target/release.

[build]
target-dir = "build"

[alias]
# Standard shortcuts
r = "run --bin lurek2d --"
c = "check"
t = "test"

# Project-specific shortcuts using the parallel runner
pc = "!python tools/dev/parallel_cargo.py"
test-all = "!python tools/dev/parallel_cargo.py test all"
demo = "run --bin lurek2d -- content/games/showcase/hello_world"

# Intentionally no Windows-specific debug linker override here.
# The previous /DEBUG:FASTLINK setting caused unstable `lua_tests` links on
# large debug builds under MSVC, so the repository now relies on Cargo's
# default debug linking behavior for correctness.

# Statically link the MSVC C++ runtime on Windows.
# This bakes VCRUNTIME140.dll (and friends) directly into the .exe so the
# binary runs on a clean machine without Visual C++ Redistributable installed.
# The condition is scoped to windows-msvc only — GNU/Linux builds are unaffected.
[target.'cfg(all(target_os = "windows", target_env = "msvc"))']
rustflags = ["-C", "target-feature=+crt-static"]
