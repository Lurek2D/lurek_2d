# Lurek2D Cargo configuration
# Redirect all build outputs to build/debug and build/release
# instead of the default target/debug and target/release.

[build]
target-dir = "build"

# Intentionally no Windows-specific debug linker override here.
# The previous /DEBUG:FASTLINK setting caused unstable `lua_tests` links on
# large debug builds under MSVC, so the repository now relies on Cargo's
# default debug linking behavior for correctness.
