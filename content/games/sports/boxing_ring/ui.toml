[[widget]]
type = "panel"
id = "title_screen"
anchor = "center"
w = 800
h = 600
visible = false

  [[widget.children]]
  type = "label"
  text = "BOXING RING"
  font_size = 30
  color = [1, 0.85, 0.3, 1]
  anchor = "top_center"
  y = 140

  [[widget.children]]
  type = "label"
  text = "FIGHT NIGHT"
  font_size = 30
  color = [1, 1, 1, 1]
  anchor = "top_center"
  y = 190

  [[widget.children]]
  type = "button"
  id = "press_start"
  text = "Press J or SPACE to start"
  font_size = 24
  color = [0.5, 0.5, 0.5, 1]
  anchor = "top_center"
  y = 340

  [[widget.children]]
  type = "label"
  text = "J=Jab  K=Hook  L=Uppercut  Space=Block"
  font_size = 16
  color = [0.5, 0.5, 0.5, 1]
  anchor = "top_center"
  y = 380

  [[widget.children]]
  type = "label"
  text = "W=Duck  S=Lean back  A/D=Move"
  font_size = 16
  color = [0.5, 0.5, 0.5, 1]
  anchor = "top_center"
  y = 405

[[widget]]
type = "panel"
id = "hud"
anchor = "top_left"
w = 800
h = 600
visible = true

  [[widget.children]]
  type = "panel"
  anchor = "top_left"
  w = 800
  h = 55
  bg_color = [0.1, 0.1, 0.12, 0.85]

    [[widget.children.children]]
    type = "label"
