    text = "Combo x2"
    font_size = 20
    color = [1, 0.5, 0.2, 1]
    anchor = "top_center"
    y = 6
    visible = false

    [[widget.children.children]]
    type = "label"
    id = "fps_label"
    text = "FPS: 60"
    font_size = 16
    color = [0.4, 0.4, 0.4, 1]
    anchor = "top_right"
    x = -80
    y = 8

