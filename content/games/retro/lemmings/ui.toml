[root]
widget_type = "panel"
id = "root_ui"
w = 800
h = 600
bg_color = [0, 0, 0, 0]

  [[root.children]]
  widget_type = "panel"
  id = "title_screen"
  w = 800
  h = 600
  visible = false

    [[root.children.children]]
    widget_type = "label"
    text = "LEMMINGS"
    font_size = 30
    color = [0.3, 0.7, 1.0, 1]
    anchor = "center"
    y = -120

    [[root.children.children]]
    widget_type = "label"
    text = "LET'S GO!"
    font_size = 24
    color = [0.2, 0.9, 0.3, 1]
    anchor = "center"
    y = -40

    [[root.children.children]]
    widget_type = "label"
    text = "Press ENTER to start"
    font_size = 16
    color = [0.7, 0.7, 0.7, 1]
    anchor = "center"
    y = 40

    [[root.children.children]]
    widget_type = "label"
    text = "Assign jobs: 1=Blocker  2=Digger  3=Builder  4=Basher"
    font_size = 12
    color = [0.7, 0.7, 0.7, 1]
    anchor = "center"
    y = 100

    [[root.children.children]]
    widget_type = "label"
    text = "Hover cursor near lemming + press key"
    font_size = 12
    color = [0.7, 0.7, 0.7, 1]
    anchor = "center"
    y = 130

  [[root.children]]
  widget_type = "panel"
  id = "game_over_screen"
  w = 800
  h = 600
  visible = false

    [[root.children.children]]
    widget_type = "label"
    text = "GAME OVER"
    font_size = 30
    color = [0.9, 0.8, 0.2, 1]
    anchor = "center"
