[[widget]]
type = "panel"
id = "title_screen"
anchor = "center"
width = 800
height = 600
bg_color = [0.05, 0.15, 0.45, 1]
visible = true

  [[widget.children]]
  type = "label"
  text = "F R O G G E R"
  font_size = 32
  color = [0.1, 0.9, 0.1, 1]
  anchor = "top_center"
  y = 100

  [[widget.children]]
  type = "label"
  text = "    @..@    \n   (----)   \n  ( >  < )  \n  ^^ /\\ ^^  \n    ~~~~    "
  font_size = 22
  color = [0.2, 0.8, 0.2, 1]
  anchor = "top_center"
  y = 180

  [[widget.children]]
  type = "label"
  text = "Guide the frog across roads and rivers!"
  font_size = 16
  color = [1, 1, 1, 0.9]
  anchor = "top_center"
  y = 350

  [[widget.children]]
  type = "label"
  text = "Ride logs and turtles — don't fall in!"
  font_size = 16
  color = [1, 1, 1, 0.9]
  anchor = "top_center"
  y = 375

  [[widget.children]]
  type = "label"
  text = "Fill all 5 home slots to win!"
  font_size = 16
  color = [1, 1, 1, 0.9]
  anchor = "top_center"
  y = 400

  [[widget.children]]
  type = "button"
  id = "press_enter"
  text = "PRESS ENTER"
  font_size = 24
  color = [1, 1, 0, 1]
  anchor = "top_center"
  y = 470

  [[widget.children]]
  type = "label"
  id = "high_score_title"
  text = "HIGH SCORE: 0"
  font_size = 16
  color = [0.8, 0.8, 0.2, 1]
  anchor = "top_center"
  y = 530

[[widget]]
type = "panel"
id = "hud"
anchor = "top_left"
width = 800
height = 600
visible = false

  [[widget.children]]
  type = "label"
  id = "score_label"
  text = "SCORE: 0"
  font_size = 16
  x = 10
  y = 6
  color = [1, 1, 1, 1]

  [[widget.children]]
  type = "label"
  id = "level_label"
  text = "LVL 1"
  font_size = 16
  anchor = "top_center"
  y = 6
  color = [1, 1, 1, 1]

  [[widget.children]]
  type = "label"
  id = "lives_label"
  text = "LIVES: 3"
  font_size = 16
  anchor = "top_right"
  x = -10
  y = 6
  color = [0.15, 0.75, 0.15, 1]

  [[widget.children]]
  type = "label"
  text = "TIME"
  font_size = 16
  anchor = "bottom_center"
  x = -140
  y = -22
  color = [1, 1, 1, 0.8]

  [[widget.children]]
  type = "label"
  id = "fps_label"
  text = "FPS: 60"
  font_size = 12
  anchor = "bottom_left"
  x = 10
  y = -20
  color = [0.5, 0.5, 0.5, 0.6]

[[widget]]
type = "panel"
id = "game_over_screen"
anchor = "center"
width = 800
height = 600
bg_color = [0, 0, 0, 0.7]
visible = false

  [[widget.children]]
  type = "label"
  text = "GAME OVER"
  font_size = 40
  color = [1, 0.2, 0.2, 1]
  anchor = "top_center"
  y = 200

  [[widget.children]]
  type = "label"
  id = "final_score"
  text = "SCORE: 0"
  font_size = 24
  color = [1, 1, 1, 1]
  anchor = "top_center"
  y = 280

  [[widget.children]]
  type = "label"
  id = "final_level"
  text = "LEVEL: 1"
  font_size = 20
  color = [1, 1, 1, 1]
  anchor = "top_center"
  y = 320

  [[widget.children]]
  type = "label"
  id = "new_high_score"
  text = "NEW HIGH SCORE!"
  font_size = 20
  color = [1, 1, 0, 1]
  anchor = "top_center"
  y = 360
  visible = false

  [[widget.children]]
  type = "button"
  id = "press_retry"
  text = "PRESS ENTER TO RETRY"
  font_size = 20
  color = [1, 1, 1, 0.9]
  anchor = "top_center"
  y = 430
