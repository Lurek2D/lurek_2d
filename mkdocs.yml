site_name: Lurek2D
site_description: Single-binary 2D Rust runtime for Lua game scripts
site_url: https://lurek2d.github.io/lurek_2d/
repo_url: https://github.com/Lurek2D/lurek_2d
repo_name: Lurek2D/lurek_2d
edit_uri: ""

docs_dir: docs
site_dir: pages
use_directory_urls: false

exclude_docs: |
  specs/
  api/
  wiki/
  templates/
  snippets.md
  linux_build.md

theme:
  name: material
  palette:
    - scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
    - scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.instant
    - navigation.indexes
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.code.annotate
  icon:
    repo: fontawesome/brands/github
  logo: assets/logo.png
  favicon: assets/favicon.ico

extra_css:
  - assets/lurek.css

markdown_extensions:
  - admonition
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.details
  - attr_list
  - md_in_html
  - toc:
      permalink: true

plugins:
  - search

validation:
  omitted_files: ignore
  absolute_links: ignore
  unrecognized_links: ignore

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/Lurek2D/lurek_2d

